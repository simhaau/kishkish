<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול גרסאות — SA Set Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;300;400;500;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #22d3ee;
            --accent-glow: rgba(34, 211, 238, 0.3);
            --bg: #0a0a0f;
            --bg-elevated: #12121a;
            --bg-card: #1a1a25;
            --bg-card-hover: #222230;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Heebo', 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .ambient-bg::before {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            top: -200px;
            right: -200px;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
            animation: float1 20s ease-in-out infinite;
        }
        .ambient-bg::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            bottom: -100px;
            left: -100px;
            background: radial-gradient(circle, rgba(34,211,238,0.1) 0%, transparent 70%);
            animation: float2 25s ease-in-out infinite;
        }
        @keyframes float1 {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(-50px, 30px) scale(1.1); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(40px, -20px) scale(1.05); }
        }

        .noise {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .grid-pattern {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: 
                linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* === LOGIN SCREEN === */
        .login-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .login-overlay.hidden {
            display: none;
        }
        .login-card {
            background: linear-gradient(145deg, var(--bg-card) 0%, rgba(99,102,241,0.08) 100%);
            border: 1px solid var(--border-hover);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-light), var(--accent), transparent);
        }
        .login-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(34,211,238,0.1));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .login-icon svg {
            width: 28px;
            height: 28px;
            color: var(--primary-light);
        }
        .login-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }
        .login-input {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 4px;
            transition: all 0.3s;
            margin-bottom: 16px;
            direction: ltr;
        }
        .login-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        .login-input::placeholder {
            letter-spacing: 2px;
            font-weight: 400;
            color: var(--text-muted);
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 40px -10px rgba(99,102,241,0.5);
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 50px -10px rgba(99,102,241,0.6);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .login-error {
            color: var(--danger);
            font-size: 13px;
            margin-top: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            min-height: 20px;
        }
        .login-error.show {
            opacity: 1;
        }

        /* === HEADER === */
        header {
            padding: 40px 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(245,158,11,0.1));
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            color: #f87171;
            letter-spacing: 0.5px;
        }
        .admin-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #f87171;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(239,68,68,0.5);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .header-title {
            font-size: 1.5rem;
            font-weight: 800;
        }
        .header-actions {
            display: flex;
            gap: 12px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 10px 40px -10px rgba(99,102,241,0.5);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 50px -10px rgba(99,102,241,0.6);
        }
        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border-hover);
            color: var(--text-primary);
        }
        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: var(--primary-light);
        }
        .btn-danger {
            background: linear-gradient(135deg, rgba(239,68,68,0.2), rgba(239,68,68,0.1));
            border: 1px solid rgba(239,68,68,0.3);
            color: #f87171;
        }
        .btn-danger:hover {
            background: rgba(239,68,68,0.3);
        }
        .btn svg {
            width: 18px;
            height: 18px;
        }

        /* === PANELS === */
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            transition: all 0.3s;
        }
        .panel:hover {
            border-color: var(--border-hover);
        }
        .panel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .panel-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(34,211,238,0.1));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .panel-icon svg {
            width: 20px;
            height: 20px;
            color: var(--primary-light);
        }
        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* === FORM === */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group.full {
            grid-column: 1 / -1;
        }
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .form-input, .form-textarea {
            padding: 14px 18px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        .form-input::placeholder, .form-textarea::placeholder {
            color: var(--text-muted);
        }
        .form-textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.8;
        }
        .form-hint {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* === NOTES LIST === */
        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
        }
        .note-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.2s;
        }
        .note-item:hover {
            border-color: var(--border-hover);
        }
        .note-number {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }
        .note-text {
            flex: 1;
            font-size: 14px;
            color: var(--text-primary);
        }
        .note-delete {
            width: 32px;
            height: 32px;
            background: transparent;
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 8px;
            color: var(--danger);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .note-delete:hover {
            background: rgba(239,68,68,0.15);
        }
        .note-delete svg {
            width: 16px;
            height: 16px;
        }
        .note-add-row {
            display: flex;
            gap: 10px;
        }
        .note-add-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
        }
        .note-add-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .note-add-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--success), #16a34a);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .note-add-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px -5px rgba(34,197,94,0.4);
        }

        /* === VERSIONS TABLE === */
        .versions-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }
        .versions-table th {
            text-align: right;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .version-row {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: all 0.3s;
        }
        .version-row:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
        }
        .version-row td {
            padding: 16px;
            font-size: 14px;
        }
        .version-row td:first-child {
            border-radius: 0 16px 16px 0;
        }
        .version-row td:last-child {
            border-radius: 16px 0 0 16px;
        }
        .version-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(34,211,238,0.1));
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary-light);
            font-family: 'Inter', sans-serif;
        }
        .version-tag.latest {
            background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(22,163,74,0.1));
            color: var(--success);
        }
        .version-tag.latest::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
        }
        .version-date {
            color: var(--text-muted);
            font-size: 13px;
        }
        .version-url {
            color: var(--text-secondary);
            font-size: 12px;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            direction: ltr;
            text-align: left;
        }
        .version-notes-count {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: var(--bg-card);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .row-actions {
            display: flex;
            gap: 8px;
        }
        .row-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .row-btn svg {
            width: 16px;
            height: 16px;
        }
        .row-btn-edit {
            background: rgba(99,102,241,0.15);
            color: var(--primary-light);
        }
        .row-btn-edit:hover {
            background: var(--primary);
            color: white;
        }
        .row-btn-delete {
            background: rgba(239,68,68,0.1);
            color: var(--danger);
        }
        .row-btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        /* === MODAL === */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border-hover);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            transform: translateY(20px);
            transition: transform 0.3s;
        }
        .modal-overlay.active .modal {
            transform: translateY(0);
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: 800;
        }
        .modal-close {
            width: 36px;
            height: 36px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }
        .modal-close svg {
            width: 18px;
            height: 18px;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }

        /* === TOAST === */
        .toast-container {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            transform: translateX(-120%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.show {
            transform: translateX(0);
        }
        .toast-success { background: linear-gradient(135deg, var(--success), #16a34a); }
        .toast-error { background: linear-gradient(135deg, var(--danger), #dc2626); }
        .toast-warning { background: linear-gradient(135deg, var(--warning), #d97706); }
        .toast svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* === EMPTY STATE === */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(34,211,238,0.05));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .empty-icon svg {
            width: 28px;
            height: 28px;
            color: var(--text-muted);
        }
        .empty-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .empty-desc {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* === FOOTER === */
        footer {
            border-top: 1px solid var(--border);
            padding: 32px 0 48px;
            margin-top: 40px;
            text-align: center;
        }
        .footer-text {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* === ANIMATIONS === */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }

        /* === RESPONSIVE === */
        @media (max-width: 640px) {
            header {
                flex-direction: column;
                text-align: center;
            }
            .header-actions {
                width: 100%;
                justify-content: center;
            }
            .panel { padding: 24px; }
            .form-grid { grid-template-columns: 1fr; }
            .versions-table {
                display: block;
                overflow-x: auto;
            }
            .version-row td {
                white-space: nowrap;
            }
            .login-card { padding: 32px 24px; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
<base target="_blank">
</head>
<body>
    <div class="ambient-bg"></div>
    <div class="noise"></div>
    <div class="grid-pattern"></div>

    <!-- LOGIN OVERLAY -->
    <div class="login-overlay" id="loginOverlay">

    <!-- TOASTS -->

                </div>
                <div class="panel-title">הוספת גרסה חדשה</div>

            <div class="form-grid">

                    <input type="text" class="form-input" id="newVersion" placeholder="למשל: 1.3.0" dir="ltr">

                <div class="form-group">

                    <input type="date" class="form-input" id="newDate">

                <div class="form-group full">
                    <label class="form-label">קישור הורדה (URL)</label>
                    <input type="url" class="form-input" id="newUrl" placeholder="https://example.com/sa-set-builder-v1.3.0.exe" dir="ltr">
                </div>
                <div class="form-group full">
                    <label class="form-label">הערות שחרור (Release Notes)</label>
                    <div class="notes-list" id="newNotesList"></div>
                    <div class="note-add-row">
                        <input type="text" class="note-add-input" id="newNoteInput" placeholder="הקלד הערה ולחץ הוספה..." onkeypress="if(event.key==='Enter') addNewNote()">
                        <button class="note-add-btn" onclick="addNewNote()">הוספה</button>

                    <div class="form-hint">כל שורה היא נקודה ברשימת השינויים של הגרסה</div>

            <button class="btn btn-primary" onclick="addVersion()" style="width:100%; justify-content:center; padding:16px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>

                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <div class="panel-title">גרסאות קיימות</div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">עריכת גרסה</div>
                <button class="modal-close" onclick="closeEditModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">מספר גרסה</label>
                    <input type="text" class="form-input" id="editVersion" dir="ltr">
                </div>
                <div class="form-group">
                    <label class="form-label">תאריך שחרור</label>
                    <input type="date" class="form-input" id="editDate">
                </div>
                <div class="form-group full">
                    <label class="form-label">קישור הורדה (URL)</label>
                    <input type="url" class="form-input" id="editUrl" dir="ltr">
                </div>
                <div class="form-group full">
                    <label class="form-label">הערות שחרור</label>
                    <div class="notes-list" id="editNotesList"></div>
                    <div class="note-add-row">
                        <input type="text" class="note-add-input" id="editNoteInput" placeholder="הקלד הערה ולחץ הוספה..." onkeypress="if(event.key==='Enter') addEditNote()">
                        <button class="note-add-btn" onclick="addEditNote()">הוספה</button>
                    </div>
                </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeEditModal()">ביטול</button>
                <button class="btn btn-primary" onclick="saveEdit()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    שמור שינויים
                </button>
            </div>
        </div>
    </div>

    <script>
        // === CONFIGURATION ===
        const ACCESS_CODE = '119240';
        const VERSIONS_FILE = 'versions.json';

        // === STATE ===
        let versions = [];
        let newNotes = [];
        let editNotes = [];
        let editingIndex = -1;
        let isLoggedIn = false;

        // === LOGIN ===
        function checkLogin() {
            const input = document.getElementById('loginCode').value.trim();
            const error = document.getElementById('loginError');

            if (input === ACCESS_CODE) {
                isLoggedIn = true;
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainContent').style.display = 'block';
                loadVersions();
                showToast('success', 'ברוך הבא! כניסה בוצעה בהצלחה.');
            } else {
                error.classList.add('show');
                document.getElementById('loginCode').value = '';
                document.getElementById('loginCode').focus();
                setTimeout(() => error.classList.remove('show'), 3000);
            }
        }

        function logout() {
            isLoggedIn = false;
            document.getElementById('loginOverlay').classList.remove('hidden');
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('loginCode').value = '';
        }

        document.getElementById('loginCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkLogin();
        });

        // === DATA LOADING ===
        async function loadVersions() {
            try {
                const response = await fetch(VERSIONS_FILE + '?t=' + Date.now());
                if (!response.ok) throw new Error('Failed to load');
                const data = await response.json();
                versions = data.versions || [];
                versions.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderVersionsTable();
            } catch (err) {
                showToast('error', 'שגיאה בטעינת הגרסאות: ' + err.message);
                versions = [];
                renderVersionsTable();
            }
        }

        // === RENDER TABLE ===
        function renderVersionsTable() {
            const container = document.getElementById('versionsTableContainer');

            if (versions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        </div>
                        <div class="empty-title">אין גרסאות</div>
                        <div class="empty-desc">הוסף את הגרסה הראשונה למעלה</div>
                    </div>
                `;
                return;
            }

            let html = `<table class="versions-table"><thead><tr>
                <th>גרסה</th>
                <th>תאריך</th>
                <th>קישור</th>
                <th>הערות</th>
                <th>פעולות</th>
            </tr></thead><tbody>`;

            versions.forEach((v, i) => {
                const isLatest = i === 0;
                const notesCount = v.notes ? v.notes.length : 0;
                html += `<tr class="version-row">
                    <td><span class="version-tag ${isLatest ? 'latest' : ''}">${escapeHtml(v.version)} ${isLatest ? '(עדכנית)' : ''}</span></td>
                    <td class="version-date">${formatDate(v.date)}</td>
                    <td class="version-url" title="${escapeHtml(v.downloadUrl)}">${escapeHtml(v.downloadUrl)}</td>
                    <td><span class="version-notes-count">${notesCount} הערות</span></td>
                    <td>
                        <div class="row-actions">
                            <button class="row-btn row-btn-edit" onclick="openEditModal(${i})" title="ערוך">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button class="row-btn row-btn-delete" onclick="deleteVersion(${i})" title="מחק">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </div>
                    </td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // === NOTES MANAGEMENT ===
        function renderNotesList(notes, containerId, isEdit = false) {
            const container = document.getElementById(containerId);
            if (notes.length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted); font-size:13px; padding:8px 0;">אין הערות — הוסף למטה</div>';
                return;
            }
            container.innerHTML = notes.map((note, i) => `
                <div class="note-item">
                    <div class="note-number">${i + 1}</div>
                    <div class="note-text">${escapeHtml(note)}</div>
                    <button class="note-delete" onclick="removeNote(${i}, ${isEdit})" title="הסר">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            `).join('');
        }

        function addNewNote() {
            const input = document.getElementById('newNoteInput');
            const text = input.value.trim();
            if (!text) return;
            newNotes.push(text);
            input.value = '';
            renderNotesList(newNotes, 'newNotesList', false);
        }

        function addEditNote() {
            const input = document.getElementById('editNoteInput');
            const text = input.value.trim();
            if (!text) return;
            editNotes.push(text);
            input.value = '';
            renderNotesList(editNotes, 'editNotesList', true);
        }

        function removeNote(index, isEdit) {
            if (isEdit) {
                editNotes.splice(index, 1);
                renderNotesList(editNotes, 'editNotesList', true);
            } else {
                newNotes.splice(index, 1);
                renderNotesList(newNotes, 'newNotesList', false);
            }
        }

        // === ADD VERSION ===
        async function addVersion() {
            const version = document.getElementById('newVersion').value.trim();
            const date = document.getElementById('newDate').value;
            const url = document.getElementById('newUrl').value.trim();

            if (!version || !date || !url) {
                showToast('warning', 'נא למלא את כל השדות החובה');
                return;
            }

            // Check if version already exists
            if (versions.some(v => v.version === version)) {
                showToast('warning', 'גרסה זו כבר קיימת');
                return;
            }

            const newVersion = {
                version: version,
                date: date,
                downloadUrl: url,
                notes: [...newNotes]
            };

            versions.unshift(newVersion);
            versions.sort((a, b) => new Date(b.date) - new Date(a.date));

            await saveVersions();

            // Reset form
            document.getElementById('newVersion').value = '';
            document.getElementById('newDate').value = '';
            document.getElementById('newUrl').value = '';
            newNotes = [];
            renderNotesList(newNotes, 'newNotesList', false);

            showToast('success', `גרסה ${version} נוספה בהצלחה!`);
        }

        // === EDIT VERSION ===
        function openEditModal(index) {
            editingIndex = index;
            const v = versions[index];
            document.getElementById('editVersion').value = v.version;
            document.getElementById('editDate').value = v.date;
            document.getElementById('editUrl').value = v.downloadUrl;
            editNotes = v.notes ? [...v.notes] : [];
            renderNotesList(editNotes, 'editNotesList', true);
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingIndex = -1;
            editNotes = [];
        }

        async function saveEdit() {
            if (editingIndex < 0) return;

            const version = document.getElementById('editVersion').value.trim();
            const date = document.getElementById('editDate').value;
            const url = document.getElementById('editUrl').value.trim();

            if (!version || !date || !url) {
                showToast('warning', 'נא למלא את כל השדות');
                return;
            }

            // Check duplicate version number (excluding current)
            const duplicate = versions.find((v, i) => v.version === version && i !== editingIndex);
            if (duplicate) {
                showToast('warning', 'מספר גרסה זה כבר קיים');
                return;
            }

            versions[editingIndex] = {
                version: version,
                date: date,
                downloadUrl: url,
                notes: [...editNotes]
            };

            versions.sort((a, b) => new Date(b.date) - new Date(a.date));
            await saveVersions();
            closeEditModal();
            showToast('success', `גרסה ${version} עודכנה בהצלחה!`);
        }

        // === DELETE VERSION ===
        async function deleteVersion(index) {
            const v = versions[index];
            if (!confirm(`האם אתה בטוח שברצונך למחוק את גרסה ${v.version}?

פעולה זו בלתי הפיכה!`)) {
                return;
            }

            versions.splice(index, 1);
            await saveVersions();
            showToast('success', `גרסה ${v.version} נמחקה בהצלחה`);
        }

        // === SAVE TO FILE ===
        async function saveVersions() {
            const data = { versions: versions };
            const jsonStr = JSON.stringify(data, null, 2);

            // Create blob and download (client-side save)
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'versions.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            renderVersionsTable();

            // Note: In production, you'd send this to a server endpoint
            showToast('warning', 'קובץ versions.json הורד — העלה אותו לשרת כדי לעדכן');
        }

        // === UTILITIES ===
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            try {
                const d = new Date(dateStr);
                return d.toLocaleDateString('he-IL', { year: 'numeric', month: 'long', day: 'numeric' });
            } catch {
                return dateStr;
            }
        }

        function showToast(type, message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;

            const icons = {
                success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>',
                error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>',
                warning: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>'
            };

            toast.innerHTML = icons[type] + message;
            container.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.add('show');
            });

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        // Initialize
        renderNotesList(newNotes, 'newNotesList', false);
    </script>
